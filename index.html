<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#1f3a5f" />
<link rel="manifest" href="manifest.json" />
<title>Diário de Faltas</title>
<style>
  /* ---------- tokens ---------- */
  :root {
    --tinta:    #1f3a5f;   /* azul-caneta: acento e texto forte */
    --tinta-2:  #2f5586;   /* azul mais claro p/ estados */
    --papel:    #faf8f2;   /* creme de papel */
    --papel-2:  #f2eee2;   /* faixa alternada */
    --linha:    #d9cfb8;   /* pauta do caderno */
    --margem:   #c98a8a;   /* margem vermelha do caderno */
    --texto:    #2a2a26;
    --apagado:  #8a8478;
    --erro:     #a23b3b;
    --ok:       #3f7a4f;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; }
  body {
    font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    background: var(--papel);
    color: var(--texto);
    line-height: 1.45;
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* ---------- cabeçalho ---------- */
  header {
    background: var(--tinta);
    color: var(--papel);
    padding: calc(env(safe-area-inset-top) + 14px) 18px 14px;
    border-bottom: 3px double rgba(255,255,255,.35);
  }
  header h1 {
    margin: 0;
    font-size: 1.35rem;
    font-weight: 600;
    letter-spacing: .5px;
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  header h1 .nro {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: .7rem;
    letter-spacing: 2px;
    opacity: .7;
    text-transform: uppercase;
  }

  /* ---------- abas ---------- */
  nav.tabs {
    display: flex;
    background: var(--tinta);
    border-bottom: 1px solid rgba(0,0,0,.15);
    position: sticky; top: 0; z-index: 5;
  }
  nav.tabs button {
    flex: 1;
    background: transparent;
    border: none;
    color: rgba(255,255,255,.6);
    font-family: inherit;
    font-size: .8rem;
    padding: 11px 2px;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: color .15s, border-color .15s;
  }
  nav.tabs button[aria-selected="true"] {
    color: #fff;
    border-bottom-color: var(--papel);
    font-weight: 600;
  }

  /* ---------- painéis ---------- */
  main { padding: 16px; max-width: 640px; margin: 0 auto; }
  .panel { display: none; animation: fade .25s ease; }
  .panel.ativo { display: block; }
  @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }

  h2 {
    font-size: 1.05rem; font-weight: 600; color: var(--tinta);
    margin: 4px 0 14px; padding-left: 12px;
    border-left: 3px solid var(--margem);
  }
  .sub { color: var(--apagado); font-size: .82rem; margin: -8px 0 16px 12px; }

  /* ---------- controles ---------- */
  label.campo { display: block; margin: 0 0 14px; }
  label.campo > span {
    display: block; font-size: .75rem; text-transform: uppercase;
    letter-spacing: 1px; color: var(--apagado); margin-bottom: 5px;
  }
  select, input[type="text"], input[type="date"] {
    width: 100%; font-family: inherit; font-size: 1rem;
    padding: 11px 12px; color: var(--texto);
    background: #fff; border: 1px solid var(--linha);
    border-radius: 8px;
  }
  select:focus, input:focus { outline: 2px solid var(--tinta-2); border-color: var(--tinta-2); }

  .linha-2 { display: flex; gap: 10px; }
  .linha-2 > * { flex: 1; }

  button.acao {
    font-family: inherit; font-size: .95rem; font-weight: 600;
    color: #fff; background: var(--tinta);
    border: none; border-radius: 8px; padding: 12px 18px;
    cursor: pointer; transition: background .15s;
  }
  button.acao:active { background: var(--tinta-2); }
  button.acao.secundaria { background: transparent; color: var(--tinta); border: 1px solid var(--tinta); }
  button.acao:disabled { opacity: .45; cursor: default; }

  /* ---------- lista de chamada (caderno) ---------- */
  .chamada { margin-top: 8px; border-top: 1px solid var(--linha); }
  .chamada .aluno-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 8px 12px 16px;
    border-bottom: 1px solid var(--linha);
    background: linear-gradient(to right, var(--margem) 0 2px, transparent 2px);
  }
  .chamada .aluno-row:nth-child(even) { background-color: var(--papel-2);
    background-image: linear-gradient(to right, var(--margem) 0 2px, transparent 2px); }
  .chamada label { flex: 1; display: flex; align-items: center; gap: 12px; cursor: pointer; font-size: 1rem; }
  .chamada input[type="checkbox"] { width: 22px; height: 22px; accent-color: var(--margem); flex: none; }

  /* ---------- tabela de dados ---------- */
  table { width: 100%; border-collapse: collapse; margin-top: 6px; }
  th, td { text-align: left; padding: 10px 8px 10px 14px; border-bottom: 1px solid var(--linha); }
  th { font-size: .72rem; text-transform: uppercase; letter-spacing: 1px; color: var(--apagado); font-weight: 600; }
  td.num { text-align: right; font-family: ui-monospace, Menlo, monospace; font-variant-numeric: tabular-nums; padding-right: 18px; }
  tr.zero td { color: var(--apagado); }
  td .pill {
    display: inline-block; min-width: 26px; text-align: center;
    background: var(--tinta); color: #fff; border-radius: 20px;
    padding: 2px 9px; font-size: .85rem;
  }
  td .pill.zero { background: var(--linha); color: var(--apagado); }

  /* ---------- editor de alunos ---------- */
  textarea {
    width: 100%; min-height: 220px; font-family: inherit; font-size: 1rem;
    line-height: 1.9; padding: 10px 12px 10px 16px;
    border: 1px solid var(--linha); border-radius: 8px;
    background:
      linear-gradient(var(--papel) 0 0) padding-box,
      repeating-linear-gradient(var(--papel), var(--papel) 33px, var(--linha) 33px, var(--linha) 34px);
    resize: vertical;
  }
  textarea:focus { outline: 2px solid var(--tinta-2); }

  /* ---------- diversos ---------- */
  .vazio { color: var(--apagado); font-style: italic; padding: 24px 4px; text-align: center; }
  .barra-acoes { display: flex; gap: 10px; margin-top: 16px; }
  .barra-acoes > * { flex: 1; }
  .toast {
    position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%) translateY(20px);
    background: var(--texto); color: #fff; padding: 11px 20px; border-radius: 24px;
    font-size: .9rem; opacity: 0; pointer-events: none; transition: all .25s; z-index: 50;
    max-width: 90vw;
  }
  .toast.mostra { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.erro { background: var(--erro); }
  .rodape { margin-top: 28px; padding-top: 14px; border-top: 1px solid var(--linha); }
  .rodape h3 { font-size: .8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--apagado); margin: 0 0 10px; }
  details summary { cursor: pointer; color: var(--tinta); font-size: .9rem; }
  .datas-falta { margin: 8px 0 0; padding: 0; list-style: none; }
  .datas-falta li { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px dotted var(--linha); font-size: .9rem; }
  .datas-falta button { background: none; border: none; color: var(--erro); font-size: .85rem; cursor: pointer; font-family: inherit; }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
</style>
</head>
<body>
<header>
  <h1>Diário de Faltas <span class="nro">registro de classe</span></h1>
</header>

<nav class="tabs" role="tablist">
  <button role="tab" aria-selected="true"  data-alvo="p-turmas">Turmas</button>
  <button role="tab" aria-selected="false" data-alvo="p-faltas">Chamada</button>
  <button role="tab" aria-selected="false" data-alvo="p-dados">Relatório</button>
  <button role="tab" aria-selected="false" data-alvo="p-aluno">Aluno</button>
</nav>

<main>
  <!-- ===================== TURMAS ===================== -->
  <section id="p-turmas" class="panel ativo" role="tabpanel">
    <h2>Turmas e alunos</h2>

    <label class="campo">
      <span>Nova turma</span>
      <div class="linha-2">
        <input type="text" id="nova-turma" placeholder="ex: 3º A" />
        <button class="acao" id="btn-criar-turma" style="flex:none">Criar</button>
      </div>
    </label>

    <label class="campo">
      <span>Editar alunos da turma</span>
      <select id="sel-turma-edit"></select>
    </label>

    <div id="bloco-editor" hidden>
      <p class="sub">Um aluno por linha. Edite à vontade e salve.</p>
      <textarea id="editor-alunos" placeholder="Digite um nome por linha…"></textarea>
      <div class="barra-acoes">
        <button class="acao" id="btn-salvar-alunos">Salvar lista</button>
      </div>
    </div>

    <div class="rodape">
      <h3>Backup</h3>
      <p class="sub" style="margin-left:0">Seus dados ficam só neste aparelho. Exporte de tempos em tempos.</p>
      <div class="barra-acoes">
        <button class="acao secundaria" id="btn-exportar">Exportar</button>
        <button class="acao secundaria" id="btn-importar">Importar</button>
        <input type="file" id="arquivo-importar" accept="application/json" hidden />
      </div>
    </div>
  </section>

  <!-- ===================== CHAMADA ===================== -->
  <section id="p-faltas" class="panel" role="tabpanel">
    <h2>Fazer a chamada</h2>
    <div class="linha-2">
      <label class="campo"><span>Data</span><input type="date" id="data-falta" /></label>
      <label class="campo"><span>Turma</span><select id="sel-turma-falta"></select></label>
    </div>
    <p class="sub" style="margin-left:0">Marque quem <strong>faltou</strong>.</p>
    <div id="lista-chamada" class="chamada"></div>
    <div class="barra-acoes" id="barra-chamada" hidden>
      <button class="acao" id="btn-registrar">Registrar faltas</button>
    </div>
  </section>

  <!-- ===================== RELATÓRIO ===================== -->
  <section id="p-dados" class="panel" role="tabpanel">
    <h2>Faltas por aluno</h2>
    <label class="campo"><span>Turma</span><select id="sel-turma-view"></select></label>
    <div class="linha-2">
      <label class="campo"><span>Semestre</span>
        <select id="sel-semestre">
          <option value="1">1º semestre (01/01–15/07)</option>
          <option value="2">2º semestre (16/07–31/12)</option>
        </select>
      </label>
      <label class="campo"><span>Ano</span><select id="sel-ano"></select></label>
    </div>
    <div id="resultado-dados"></div>
  </section>

  <!-- ===================== FALTAS DO ALUNO ===================== -->
  <section id="p-aluno" class="panel" role="tabpanel">
    <h2>Faltas de um aluno</h2>
    <div class="linha-2">
      <label class="campo"><span>Turma</span><select id="sel-turma-aluno"></select></label>
      <label class="campo"><span>Aluno</span><select id="sel-aluno"></select></label>
    </div>
    <div id="resultado-aluno"></div>
  </section>
</main>

<div class="toast" id="toast"></div>

<script src="db.js"></script>
<script src="app.js"></script>
<script>
  // registra o service worker (modo offline). Falha silenciosa se servido via file://
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  }
</script>
</body>
</html>
